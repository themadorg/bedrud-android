name: CODEOWNERS Change Alert

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - ".github/CODEOWNERS"

permissions:
  contents: read
  pull-requests: write

jobs:
  alert:
    name: Flag CODEOWNERS change
    runs-on: ubuntu-latest
    steps:
      # Separate from the normal review request codeowner-review already triggers (which
      # can be missed in a big PR) - this pings @narseh-ir by name specifically, since this
      # file controls who is required to review changes, including to itself, so someone
      # could otherwise open a PR that quietly adds themselves as a codeowner.
      - name: Comment on the PR
        uses: marocchino/sticky-pull-request-comment@5770ad5eb8f42dd2c4f34da00c94c5381e49af88 # v3
        with:
          header: codeowners-alert
          message: |
            ⚠️ This PR modifies `.github/CODEOWNERS` — the file that controls who is required to review changes, including to this file itself.

            @narseh-ir — flagging you specifically (separate from the normal Code Owners review request) because this file is what defines review requirements repo-wide. Please double check nobody added or removed themselves as a reviewer without good reason.
