name: PR dev build

on:
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened]
    # Only build when something that can actually affect the app build changed -
    # skips docs/CI-template-only PRs entirely instead of wasting a build on them.
    paths:
      - "app/**"
      - "gradle/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle.properties"
      - "gradlew"
      - "gradlew.bat"
      - ".github/workflows/pr-build.yml"

# Cancel any in-progress run for the same PR when a new commit is pushed.
concurrency:
  group: pr-build-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  lint-test:
    name: Lint & Test
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic

      - name: Run lint
        run: ./gradlew lint --no-daemon

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --no-daemon

  build-dev:
    needs: lint-test
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic

      # This key signs dev/test builds only. It is separate from the real Play Store
      # release key and is never exposed to forked-repo PRs, since `pull_request`
      # (as opposed to `pull_request_target`) runs without access to repo secrets
      # for forks. The key itself was regenerated (new keystore, alias bedrud-dev) to
      # match this dev rename - the old bedrud-qa key/secrets are retired.
      - name: Decode dev signing key
        run: echo "${{ secrets.BEDRUD_DEV_KEYSTORE_BASE64 }}" | base64 -d > dev-release.jks

      - name: Build dev APK
        env:
          DEV_KEYSTORE_PASSWORD: ${{ secrets.BEDRUD_DEV_KEYSTORE_PASSWORD }}
        # versionCode = this repo's ever-increasing Actions run number, so installing a
        # newer PR's dev build over an older one is always treated as an update by
        # Android (never wiping the tester's data/login) rather than a downgrade.
        run: ./gradlew :app:assembleDev -PdevVersionCode=${{ github.run_number }} --no-daemon

      - name: Remove decoded keystore
        if: always()
        run: rm -f dev-release.jks

      - name: Upload universal APK
        id: upload-universal
        uses: actions/upload-artifact@v7
        with:
          name: bedrud-dev-pr-${{ github.event.pull_request.number }}-universal
          path: app/build/outputs/apk/dev/app-universal-dev.apk
          retention-days: 14

      - name: Upload arm64-v8a APK
        id: upload-arm64-v8a
        uses: actions/upload-artifact@v7
        with:
          name: bedrud-dev-pr-${{ github.event.pull_request.number }}-arm64-v8a
          path: app/build/outputs/apk/dev/app-arm64-v8a-dev.apk
          retention-days: 14

      - name: Upload armeabi-v7a APK
        id: upload-armeabi-v7a
        uses: actions/upload-artifact@v7
        with:
          name: bedrud-dev-pr-${{ github.event.pull_request.number }}-armeabi-v7a
          path: app/build/outputs/apk/dev/app-armeabi-v7a-dev.apk
          retention-days: 14

      - name: Upload x86_64 APK
        id: upload-x86_64
        uses: actions/upload-artifact@v7
        with:
          name: bedrud-dev-pr-${{ github.event.pull_request.number }}-x86_64
          path: app/build/outputs/apk/dev/app-x86_64-dev.apk
          retention-days: 14

      # Multiple files under one artifact name download as a single zip containing
      # all of them - no manual zipping needed (and avoids double-zipping, since
      # artifacts are always wrapped in a zip on download regardless of contents).
      - name: Upload all APKs (zip)
        id: upload-all
        uses: actions/upload-artifact@v7
        with:
          name: bedrud-dev-pr-${{ github.event.pull_request.number }}-all
          path: app/build/outputs/apk/dev/*.apk
          retention-days: 14

      # Edits the same comment on every push to this PR (matched via `header`)
      # instead of leaving a new one behind each time.
      - name: Comment build links on PR
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: dev-build
          message: |
            Dev build ready for this PR — installs alongside the real app (package id `com.bedrud.app.dev`) without touching it.

            | Option | Download |
            |---|---|
            | All architectures (single zip, all 4 APKs) | [Download](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts/${{ steps.upload-all.outputs.artifact-id }}) |
            | Universal (any device - use this if unsure) | [Download](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts/${{ steps.upload-universal.outputs.artifact-id }}) |
            | arm64-v8a (most modern phones) | [Download](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts/${{ steps.upload-arm64-v8a.outputs.artifact-id }}) |
            | armeabi-v7a (older 32-bit phones) | [Download](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts/${{ steps.upload-armeabi-v7a.outputs.artifact-id }}) |
            | x86_64 (emulators) | [Download](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts/${{ steps.upload-x86_64.outputs.artifact-id }}) |
