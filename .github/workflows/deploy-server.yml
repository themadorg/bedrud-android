name: Deploy Server

# Auto-deploys the bedrud server binary to the live instance on every push to
# master. The instance runs the single static binary under systemd
# (bedrud.service + the embedded livekit.service), so deployment is:
#   build linux/amd64 binary -> upload -> swap /usr/local/bin/bedrud -> restart.
#
# Required repository secrets:
#   DEPLOY_SSH_KEY  - private SSH key authorized for DEPLOY_USER@DEPLOY_HOST
#   DEPLOY_HOST     - server IP / hostname (e.g. 172.104.149.63)
#   DEPLOY_USER     - SSH user (e.g. root)

on:
  push:
    branches: [master]
    # Skip deploys for doc/site-only changes that never touch the binary.
    paths:
      - "server/**"
      - "apps/web/**"
      - ".github/workflows/deploy-server.yml"
  workflow_dispatch:

concurrency:
  group: deploy-server
  cancel-in-progress: false

env:
  LIVEKIT_VERSION: "1.10.1"

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.14.0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: server/go.sum

      - name: Build and embed frontend
        working-directory: apps/web
        run: |
          bun install --frozen-lockfile
          bun run build:embed

      - name: Cache LiveKit binary
        id: lk-cache
        uses: actions/cache@v5
        with:
          path: /tmp/livekit-cache
          key: livekit-${{ env.LIVEKIT_VERSION }}-linux-amd64

      - name: Download LiveKit binary
        run: |
          mkdir -p server/internal/livekit/bin /tmp/livekit-cache
          LK_FILE="livekit_${LIVEKIT_VERSION}_linux_amd64.tar.gz"
          if [ ! -f "/tmp/livekit-cache/${LK_FILE}" ]; then
            curl -fsSL "https://github.com/livekit/livekit/releases/download/v${LIVEKIT_VERSION}/${LK_FILE}" \
              -o "/tmp/livekit-cache/${LK_FILE}"
          fi
          tar -xzf "/tmp/livekit-cache/${LK_FILE}" -C server/internal/livekit/bin/ livekit-server
          chmod +x server/internal/livekit/bin/livekit-server

      - name: Build server binary (linux/amd64, static)
        working-directory: server
        env:
          CGO_ENABLED: "1"
          GOOS: linux
          GOARCH: amd64
          CC: zig cc -target x86_64-linux-musl
        run: |
          VERSION="$(git describe --tags --always --dirty 2>/dev/null || echo dev)"
          go build \
            -ldflags="-s -w -X main.version=${VERSION} -linkmode external -extldflags -static" \
            -o ../dist/bedrud ./cmd/bedrud/main.go
          file ../dist/bedrud

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Upload binary
        run: |
          scp -i ~/.ssh/deploy_key dist/bedrud \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/tmp/bedrud.new"

      - name: Swap binary and restart services
        run: |
          ssh -i ~/.ssh/deploy_key \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" 'bash -se' <<'REMOTE'
          set -euo pipefail
          # Back up the current binary so a bad deploy can be rolled back.
          if [ -f /usr/local/bin/bedrud ]; then
            cp -f /usr/local/bin/bedrud /usr/local/bin/bedrud.prev
          fi
          chmod +x /tmp/bedrud.new
          # bedrud.service and livekit.service both exec the same binary, so
          # both must be stopped before the file can be replaced on disk.
          systemctl stop bedrud livekit
          mv -f /tmp/bedrud.new /usr/local/bin/bedrud
          systemctl start livekit bedrud
          sleep 3
          systemctl is-active --quiet bedrud && systemctl is-active --quiet livekit
          /usr/local/bin/bedrud --version || true
          echo "✓ Deployed: $(/usr/local/bin/bedrud --version 2>/dev/null || echo unknown)"
          REMOTE
