name: Dev & Nightly Release

on:
  push:
    branches: [main]
  schedule:
    # Every night at 00:00 UTC
    - cron: "0 0 * * *"

concurrency:
  group: release-${{ github.event_name == 'schedule' && 'nightly' || 'dev' }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Determine release channel ────────────────────────────────
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      channel: ${{ steps.channel.outputs.channel }}
      tag: ${{ steps.channel.outputs.tag }}
      docker_tag: ${{ steps.channel.outputs.docker_tag }}
      title: ${{ steps.channel.outputs.title }}
      sha_short: ${{ steps.channel.outputs.sha_short }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine channel
        id: channel
        run: |
          SHA_SHORT=$(git rev-parse --short=7 HEAD)
          echo "sha_short=$SHA_SHORT" >> "$GITHUB_OUTPUT"

          if [ "${{ github.event_name }}" = "schedule" ]; then
            DATE=$(date -u +%Y%m%d)
            echo "channel=nightly" >> "$GITHUB_OUTPUT"
            echo "tag=nightly-${DATE}" >> "$GITHUB_OUTPUT"
            echo "docker_tag=nightly" >> "$GITHUB_OUTPUT"
            echo "title=Nightly ${DATE}" >> "$GITHUB_OUTPUT"
          else
            echo "channel=dev" >> "$GITHUB_OUTPUT"
            echo "tag=dev-${SHA_SHORT}" >> "$GITHUB_OUTPUT"
            echo "docker_tag=dev" >> "$GITHUB_OUTPUT"
            echo "title=Dev ${SHA_SHORT}" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for changes (nightly only)
        if: github.event_name == 'schedule'
        run: |
          # Find most recent nightly tag
          LAST_TAG=$(git tag -l "nightly-*" --sort=-v:refname | head -1)
          if [ -n "$LAST_TAG" ]; then
            LAST_SHA=$(git rev-list -n 1 "$LAST_TAG" 2>/dev/null || echo "")
            HEAD_SHA=$(git rev-parse HEAD)
            if [ "$LAST_SHA" = "$HEAD_SHA" ]; then
              echo "No changes since last nightly ($LAST_TAG) — skipping"
              exit 1
            fi
          fi

  # ── Server binaries (multi-platform) ─────────────────────────
  server-binary:
    name: Server – ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux_amd64
            deb_arch: amd64
            cgo: "1"
            cc: zig cc -target x86_64-linux-musl
            lk_arch: amd64
          - goos: linux
            goarch: arm64
            suffix: linux_arm64
            deb_arch: arm64
            cgo: "1"
            cc: zig cc -target aarch64-linux-musl
            lk_arch: arm64
          - goos: windows
            goarch: amd64
            suffix: windows_amd64
            cgo: "1"
            cc: zig cc -target x86_64-windows-gnu
    steps:
      - uses: actions/checkout@v6

      - uses: mlugg/setup-zig@v1
        with:
          version: 0.14.0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache-dependency-path: server/go.sum

      - name: Build and embed frontend
        working-directory: apps/web
        run: |
          bun install --frozen-lockfile
          bun run build:embed

      - name: Cache LiveKit binary
        id: lk-cache
        uses: actions/cache@v5
        with:
          path: /tmp/livekit-cache
          key: livekit-1.10.1-${{ matrix.goos }}-${{ matrix.goarch }}

      - name: Download LiveKit binary
        env:
          LIVEKIT_VERSION: "1.10.1"
        run: |
          mkdir -p server/internal/livekit/bin /tmp/livekit-cache
          if [ "${{ matrix.goos }}" = "windows" ]; then
            LK_FILE="livekit_${LIVEKIT_VERSION}_windows_amd64.zip"
            if [ ! -f "/tmp/livekit-cache/${LK_FILE}" ]; then
              curl -fsSL "https://github.com/livekit/livekit/releases/download/v${LIVEKIT_VERSION}/${LK_FILE}" \
                -o "/tmp/livekit-cache/${LK_FILE}"
            fi
            unzip "/tmp/livekit-cache/${LK_FILE}" livekit-server.exe -d server/internal/livekit/bin/
          else
            LK_FILE="livekit_${LIVEKIT_VERSION}_linux_${{ matrix.lk_arch }}.tar.gz"
            if [ ! -f "/tmp/livekit-cache/${LK_FILE}" ]; then
              curl -fsSL "https://github.com/livekit/livekit/releases/download/v${LIVEKIT_VERSION}/${LK_FILE}" \
                -o "/tmp/livekit-cache/${LK_FILE}"
            fi
            tar -xzf "/tmp/livekit-cache/${LK_FILE}" -C server/internal/livekit/bin/ livekit-server
            chmod +x server/internal/livekit/bin/livekit-server
          fi

      - name: Build server binary
        working-directory: server
        env:
          CGO_ENABLED: ${{ matrix.cgo }}
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CC: ${{ matrix.cc }}
        run: |
          EXT=$([[ "${{ matrix.goos }}" == "windows" ]] && echo ".exe" || echo "")
          VERSION="${{ needs.prepare.outputs.tag }}"
          if [ "${{ matrix.goos }}" == "windows" ]; then
            go build -ldflags="-s -w -X main.version=${VERSION}" -o "../dist/bedrud${EXT}" ./cmd/bedrud/main.go
          else
            go build -ldflags="-s -w -X main.version=${VERSION} -linkmode external -extldflags -static" -o "../dist/bedrud${EXT}" ./cmd/bedrud/main.go
          fi

      - name: Package server (Linux)
        if: matrix.goos == 'linux'
        run: |
          # Keep raw binary alongside tar.xz
          cp dist/bedrud dist/bedrud_${{ matrix.suffix }}

          # .deb
          mkdir -p deb/DEBIAN deb/usr/bin deb/usr/lib/systemd/system \
            deb/etc/bedrud deb/var/lib/bedrud deb/var/log/bedrud

          cp dist/bedrud deb/usr/bin/bedrud
          cp apps/server/installer/linux/bedrud.service deb/usr/lib/systemd/system/
          cp apps/server/installer/linux/postinst deb/DEBIAN/postinst
          chmod 0755 deb/DEBIAN/postinst

          {
            echo "Package: bedrud"
            DEB_VER=$(printf '%s' "${{ needs.prepare.outputs.tag }}" | sed 's/^[^0-9]/0~&/')
            echo "Version: ${DEB_VER}"
            echo "Architecture: ${{ matrix.deb_arch }}"
            echo "Maintainer: Bedrud <info@bedrud.org>"
            echo "Description: Bedrud self-hosted video meeting server"
            echo " A single binary packaging the web UI, REST API, and LiveKit WebRTC."

          } > deb/DEBIAN/control

          dpkg-deb --build deb bedrud_${{ matrix.deb_arch }}.deb

          # tar.xz portable (contains plain 'bedrud' for AUR/script compat)
          cd dist
          tar -cJf bedrud_${{ matrix.suffix }}.tar.xz bedrud
          rm bedrud

      - name: Package server (Windows)
        if: matrix.goos == 'windows'
        run: |
          cd dist
          mv bedrud.exe bedrud_${{ matrix.suffix }}.exe
          zip bedrud_${{ matrix.suffix }}.zip bedrud_${{ matrix.suffix }}.exe

      - uses: actions/upload-artifact@v7
        if: matrix.goos == 'linux'
        with:
          name: server-${{ matrix.suffix }}
          path: |
            dist/bedrud_${{ matrix.suffix }}.tar.xz
            dist/bedrud_${{ matrix.suffix }}

      - uses: actions/upload-artifact@v7
        if: matrix.goos == 'windows'
        with:
          name: server-${{ matrix.suffix }}
          path: |
            dist/bedrud_${{ matrix.suffix }}.zip
            dist/bedrud_${{ matrix.suffix }}.exe

      - uses: actions/upload-artifact@v7
        if: matrix.goos == 'linux'
        with:
          name: server-deb-${{ matrix.deb_arch }}
          path: bedrud_${{ matrix.deb_arch }}.deb

  # ── Docker image – Debian (assembled from pre-built binaries) ──
  docker-debian:
    name: Docker (Debian)
    runs-on: ubuntu-latest
    needs: [prepare, server-binary]
    steps:
      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.prepare.outputs.docker_tag }}
            type=raw,value=${{ needs.prepare.outputs.tag }}

      - uses: actions/download-artifact@v8
        with:
          pattern: server-linux_*
          path: docker-ctx

      - name: Prepare Docker context
        run: |
          cp docker-ctx/server-linux_amd64/bedrud_linux_amd64 docker-ctx/bedrud_linux_amd64
          cp docker-ctx/server-linux_arm64/bedrud_linux_arm64 docker-ctx/bedrud_linux_arm64
          chmod +x docker-ctx/bedrud_linux_*

          cat > docker-ctx/Dockerfile <<'DOCKERFILE'
          FROM debian:bookworm-slim
          RUN apt-get update && apt-get install -y --no-install-recommends ca-certificates tzdata && rm -rf /var/lib/apt/lists/*
          ARG TARGETARCH
          ARG VERSION
          LABEL org.opencontainers.image.version="${VERSION}"
          COPY bedrud_linux_${TARGETARCH} /usr/local/bin/bedrud
          EXPOSE 8090 7880
          ENTRYPOINT ["bedrud"]
          CMD ["run"]
          DOCKERFILE

      - uses: docker/build-push-action@v7
        with:
          context: docker-ctx
          file: docker-ctx/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ needs.prepare.outputs.tag }}

  # ── Docker image – Distroless (assembled from pre-built binaries) ──
  docker-distroless:
    name: Docker (Distroless)
    runs-on: ubuntu-latest
    needs: [prepare, server-binary]
    steps:
      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.prepare.outputs.docker_tag }}-distroless
            type=raw,value=${{ needs.prepare.outputs.tag }}-distroless

      - uses: actions/download-artifact@v8
        with:
          pattern: server-linux_*
          path: docker-ctx

      - name: Prepare Docker context
        run: |
          cp docker-ctx/server-linux_amd64/bedrud_linux_amd64 docker-ctx/bedrud_linux_amd64
          cp docker-ctx/server-linux_arm64/bedrud_linux_arm64 docker-ctx/bedrud_linux_arm64
          chmod +x docker-ctx/bedrud_linux_*

          cat > docker-ctx/Dockerfile <<'DOCKERFILE'
          FROM gcr.io/distroless/static-debian12
          ARG TARGETARCH
          ARG VERSION
          LABEL org.opencontainers.image.version="${VERSION}"
          COPY bedrud_linux_${TARGETARCH} /usr/local/bin/bedrud
          EXPOSE 8090 7880
          ENTRYPOINT ["bedrud"]
          CMD ["run"]
          DOCKERFILE

      - uses: docker/build-push-action@v7
        with:
          context: docker-ctx
          file: docker-ctx/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ needs.prepare.outputs.tag }}

  # ── Android APK ──────────────────────────────────────────────
  android:
    name: Android APK
    runs-on: ubuntu-latest
    needs: prepare
    defaults:
      run:
        working-directory: apps/android
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v6

      - name: Build APKs
        run: ./gradlew assembleDebug bundleDebug

      - uses: actions/upload-artifact@v7
        with:
          name: android-debug-universal
          path: apps/android/app/build/outputs/apk/debug/app-universal-debug.apk

      - uses: actions/upload-artifact@v7
        with:
          name: android-debug-arm64-v8a
          path: apps/android/app/build/outputs/apk/debug/app-arm64-v8a-debug.apk

      - uses: actions/upload-artifact@v7
        with:
          name: android-debug-armeabi-v7a
          path: apps/android/app/build/outputs/apk/debug/app-armeabi-v7a-debug.apk

      - uses: actions/upload-artifact@v7
        with:
          name: android-debug-x86_64
          path: apps/android/app/build/outputs/apk/debug/app-x86_64-debug.apk

  # ── Desktop (multi-platform) ──────────────────────────────────
  desktop:
    name: Desktop – ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: linux-x86_64
            deb_arch: amd64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            name: linux-arm64
            deb_arch: arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: windows-x86_64
            nsis_arch: x64
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
            name: windows-arm64
            nsis_arch: arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            name: macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            name: macos-arm64
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Install Slint dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libfontconfig1-dev libxkbcommon-dev libxkbcommon-x11-dev \
            libwayland-dev libgles2-mesa-dev libegl1-mesa-dev \
            libdbus-1-dev libsecret-1-dev \
            libasound2-dev
      - name: Install NSIS (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install nsis -y --no-progress
          echo "C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      - name: Add macOS x86_64 cross-compile target
        if: matrix.target == 'x86_64-apple-darwin'
        run: rustup target add x86_64-apple-darwin

      - name: Build release binary
        run: cargo build -p bedrud-desktop --release --target ${{ matrix.target }}

      # ── Linux packaging ─────────────────────────────────────
      - name: Package Linux (portable tar.xz)
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/bedrud-desktop dist/
          tar -cJf bedrud-desktop-${{ matrix.name }}.tar.xz -C dist .

      - name: Package Linux (.deb)
        if: runner.os == 'Linux'
        run: |
          mkdir -p deb/DEBIAN deb/usr/bin \
            deb/usr/share/applications \
            deb/usr/share/icons/hicolor/512x512/apps

          cp target/${{ matrix.target }}/release/bedrud-desktop deb/usr/bin/
          cp apps/web/public/logo512.png deb/usr/share/icons/hicolor/512x512/apps/bedrud.png
          cp apps/desktop/installer/linux/bedrud.desktop deb/usr/share/applications/

          {
            echo "Package: bedrud-desktop"
            DEB_VER=$(printf '%s' "${{ needs.prepare.outputs.tag }}" | sed 's/^[^0-9]/0~&/')
            echo "Version: ${DEB_VER}"
            echo "Architecture: ${{ matrix.deb_arch }}"
            echo "Maintainer: Bedrud <info@bedrud.org>"
            echo "Description: Bedrud Desktop — self-hosted video meeting client"
            echo " Native desktop client for the Bedrud video meeting platform."
            echo "Depends: libc6, libgcc1, libfontconfig1, libxkbcommon0, libsecret-1-0, libasound2"
          } > deb/DEBIAN/control

          dpkg-deb --build deb bedrud-desktop-${{ matrix.name }}.deb

      - name: Package Linux (AppImage)
        if: runner.os == 'Linux'
        run: |
          ARCH_TOOL=$([ "${{ matrix.name }}" = "linux-x86_64" ] && echo "x86_64" || echo "aarch64")

          wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-${ARCH_TOOL}.AppImage" \
            -O appimagetool
          chmod +x appimagetool

          mkdir -p AppDir/usr/bin AppDir/usr/share/icons/hicolor/512x512/apps

          cp target/${{ matrix.target }}/release/bedrud-desktop AppDir/usr/bin/
          cp apps/web/public/logo512.png AppDir/usr/share/icons/hicolor/512x512/apps/bedrud.png
          cp apps/web/public/logo512.png AppDir/bedrud.png
          cp apps/desktop/installer/linux/bedrud.desktop AppDir/bedrud.desktop
          cp apps/desktop/installer/linux/AppRun AppDir/AppRun
          chmod +x AppDir/AppRun

          ARCH="${ARCH_TOOL}" APPIMAGE_EXTRACT_AND_RUN=1 \
            ./appimagetool AppDir "bedrud-desktop-${{ matrix.name }}.AppImage"

      - uses: actions/upload-artifact@v7
        if: runner.os == 'Linux'
        with:
          name: bedrud-desktop-${{ matrix.name }}-portable
          path: bedrud-desktop-${{ matrix.name }}.tar.xz

      - uses: actions/upload-artifact@v7
        if: runner.os == 'Linux'
        with:
          name: bedrud-desktop-${{ matrix.name }}-deb
          path: bedrud-desktop-${{ matrix.name }}.deb

      - uses: actions/upload-artifact@v7
        if: runner.os == 'Linux'
        with:
          name: bedrud-desktop-${{ matrix.name }}-appimage
          path: bedrud-desktop-${{ matrix.name }}.AppImage

      # ── Windows packaging ────────────────────────────────────
      - name: Package Windows (portable zip)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item "target\${{ matrix.target }}\release\bedrud-desktop.exe" dist\
          Compress-Archive -Path dist\* -DestinationPath "bedrud-desktop-${{ matrix.name }}.zip"

      - name: Package Windows (NSIS installer)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item "target\${{ matrix.target }}\release\bedrud-desktop.exe" apps\desktop\installer\windows\
          cd apps\desktop\installer\windows
          makensis /DARCH=${{ matrix.nsis_arch }} bedrud.nsi
          Move-Item "bedrud-desktop-setup-${{ matrix.nsis_arch }}.exe" "${{ github.workspace }}\bedrud-desktop-${{ matrix.name }}-setup.exe"

      - uses: actions/upload-artifact@v7
        if: runner.os == 'Windows'
        with:
          name: bedrud-desktop-${{ matrix.name }}-portable
          path: bedrud-desktop-${{ matrix.name }}.zip

      - uses: actions/upload-artifact@v7
        if: runner.os == 'Windows'
        with:
          name: bedrud-desktop-${{ matrix.name }}-setup
          path: bedrud-desktop-${{ matrix.name }}-setup.exe

      # ── macOS packaging ──────────────────────────────────────
      - name: Package macOS (portable tar.gz + DMG)
        if: runner.os == 'macOS'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/bedrud-desktop dist/
          tar -czf bedrud-desktop-${{ matrix.name }}.tar.gz -C dist .
          mkdir -p dmg-staging
          cp target/${{ matrix.target }}/release/bedrud-desktop dmg-staging/
          hdiutil create -volname "Bedrud Desktop" -srcfolder dmg-staging -ov -format UDZO \
            "bedrud-desktop-${{ matrix.name }}.dmg"

      - uses: actions/upload-artifact@v7
        if: runner.os == 'macOS'
        with:
          name: bedrud-desktop-${{ matrix.name }}-portable
          path: bedrud-desktop-${{ matrix.name }}.tar.gz

      - uses: actions/upload-artifact@v7
        if: runner.os == 'macOS'
        with:
          name: bedrud-desktop-${{ matrix.name }}-dmg
          path: bedrud-desktop-${{ matrix.name }}.dmg

  # ── Web bundle ───────────────────────────────────────────────
  web:
    name: Web Bundle
    runs-on: ubuntu-latest
    needs: prepare
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile
      - run: bun run build

      - name: Package web build
        run: |
          mkdir -p ../../dist
          tar -cJf ../../dist/web.tar.xz -C dist/client .

      - uses: actions/upload-artifact@v7
        with:
          name: web-bundle
          path: dist/web.tar.xz

  # ── Publish release ─────────────────────────────────────────
  release:
    name: Publish ${{ needs.prepare.outputs.title }}
    runs-on: ubuntu-latest
    needs: [prepare, server-binary, docker-debian, docker-distroless, android, desktop, web]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: "{server-*,android-debug-*,web-*,bedrud-desktop-*}"

      - name: Collect release assets
        run: |
          mkdir -p release-assets

          # Server binaries (tar.xz + raw Linux + Windows zip/exe)
          find artifacts/server-linux_* artifacts/server-windows_* -type f \
            -exec cp {} release-assets/ \; 2>/dev/null || true
          # Server .deb packages
          find artifacts/server-deb-* -name "*.deb" -exec cp {} release-assets/ \; 2>/dev/null || true

          # Android debug APKs
          for f in \
            "android-debug-universal/app-universal-debug.apk:bedrud-android-universal-debug.apk" \
            "android-debug-arm64-v8a/app-arm64-v8a-debug.apk:bedrud-android-arm64-v8a-debug.apk" \
            "android-debug-armeabi-v7a/app-armeabi-v7a-debug.apk:bedrud-android-armeabi-v7a-debug.apk" \
            "android-debug-x86_64/app-x86_64-debug.apk:bedrud-android-x86_64-debug.apk"; do
            src="${f%%:*}" dst="${f##*:}"
            [ -f "artifacts/${src}" ] && cp "artifacts/${src}" "release-assets/${dst}" || true
          done

          # Desktop: portable + installers + deb packages
          find artifacts/bedrud-desktop-* -type f -exec cp {} release-assets/ \; 2>/dev/null || true

          # Web bundle
          [ -f artifacts/web-bundle/web.tar.xz ] && \
            cp artifacts/web-bundle/web.tar.xz release-assets/bedrud-web.tar.xz

          ls -la release-assets/

      - name: Generate changelog
        id: changelog
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          CHANNEL="${{ needs.prepare.outputs.channel }}"
          SHA_SHORT="${{ needs.prepare.outputs.sha_short }}"

          # Find previous tag of same channel
          if [ "$CHANNEL" = "nightly" ]; then
            PREV_TAG=$(git tag -l "nightly-*" --sort=-v:refname | head -1)
          else
            PREV_TAG=$(git tag -l "dev-*" --sort=-v:refname | head -1)
          fi

          {
            echo "body<<CHANGELOG_EOF"

            if [ "$CHANNEL" = "nightly" ]; then
              echo "## Nightly Build"
              echo ""
              echo "Automated nightly build from \`main\` at \`$SHA_SHORT\`."
            else
              echo "## Dev Build"
              echo ""
              echo "Built from [\`$SHA_SHORT\`](https://github.com/${{ github.repository }}/commit/${{ github.sha }})."
            fi

            echo ""
            echo "### Changes"
            echo ""

            if [ -n "$PREV_TAG" ]; then
              git log --pretty=format:"- %s (\`%h\`)" "$PREV_TAG"..HEAD 2>/dev/null || \
                echo "- First $CHANNEL release"
            else
              echo "- First $CHANNEL release"
            fi

            echo ""
            echo ""
            echo "### Artifacts"
            echo ""
            echo "| Platform | Asset |"
            echo "|----------|-------|"
            echo "| Linux x86_64 | \`bedrud_linux_amd64.tar.xz\` |"
            echo "| Linux ARM64 | \`bedrud_linux_arm64.tar.xz\` |"
            echo "| macOS x86_64 | \`bedrud_darwin_amd64.tar.xz\` |"
            echo "| macOS ARM64 | \`bedrud_darwin_arm64.tar.xz\` |"
            echo "| Android (universal) | \`bedrud-android-universal-debug.apk\` |"
            echo "| Android arm64-v8a | \`bedrud-android-arm64-v8a-debug.apk\` |"
            echo "| Android armeabi-v7a | \`bedrud-android-armeabi-v7a-debug.apk\` |"
            echo "| Android x86_64 | \`bedrud-android-x86_64-debug.apk\` |"
            echo "| Desktop Linux x86_64 | \`bedrud-desktop-linux-x86_64.tar.xz\` |"
            echo "| Desktop Linux ARM64 | \`bedrud-desktop-linux-arm64.tar.xz\` |"
            echo "| Desktop Windows x86_64 | \`bedrud-desktop-windows-x86_64.zip\` |"
            echo "| Desktop Windows ARM64 | \`bedrud-desktop-windows-arm64.zip\` |"
            echo "| Web | \`bedrud-web.tar.xz\` |"
            echo "| Docker | \`ghcr.io/${{ github.repository }}:$TAG\` |"
            echo ""
            echo "> This is an automated pre-release. Use [tagged releases](https://github.com/${{ github.repository }}/releases?q=v&expanded=true) for production."

            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ${{ needs.prepare.outputs.title }}
          prerelease: true
          target_commitish: ${{ github.sha }}
          body: ${{ steps.changelog.outputs.body }}
          files: release-assets/*
          token: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}

  # ── Telegram notification ─────────────────────────────────────
  telegram:
    name: Notify Telegram
    runs-on: ubuntu-latest
    needs: [prepare, release]
    if: needs.release.result == 'success'
    steps:
      - name: Send Telegram notification
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TAG: ${{ needs.prepare.outputs.tag }}
          SHA: ${{ needs.prepare.outputs.sha_short }}
          CHANNEL: ${{ needs.prepare.outputs.channel }}
          REPO: ${{ github.repository }}
        run: |
          BASE="https://github.com/${REPO}/releases/download/${TAG}"
          RELEASE_URL="https://github.com/${REPO}/releases/tag/${TAG}"
          LABEL=$([ "$CHANNEL" = "nightly" ] && echo "Nightly" || echo "Dev")

          MSG=$(cat <<EOF
          🔨 <b>Bedrud ${LABEL} — ${TAG}</b>

          Commit: <code>${SHA}</code>
          <a href="${RELEASE_URL}">📦 View all artifacts on GitHub</a>

          <b>🖥 Server binaries</b>
          • <a href="${BASE}/bedrud_linux_amd64.tar.xz">Linux x86_64</a>
          • <a href="${BASE}/bedrud_linux_arm64.tar.xz">Linux ARM64</a>

          <b>🤖 Android (debug)</b>
          • <a href="${BASE}/bedrud-android-universal-debug.apk">Universal APK</a>
          • <a href="${BASE}/bedrud-android-arm64-v8a-debug.apk">arm64-v8a</a>
          • <a href="${BASE}/bedrud-android-armeabi-v7a-debug.apk">armeabi-v7a</a>
          • <a href="${BASE}/bedrud-android-x86_64-debug.apk">x86_64</a>

          <b>🪟 Desktop Windows (installer)</b>
          • <a href="${BASE}/bedrud-desktop-windows-x86_64-setup.exe">x86_64 Setup</a>
          • <a href="${BASE}/bedrud-desktop-windows-arm64-setup.exe">ARM64 Setup</a>

          <b>🪟 Desktop Windows (portable)</b>
          • <a href="${BASE}/bedrud-desktop-windows-x86_64.zip">x86_64 zip</a>
          • <a href="${BASE}/bedrud-desktop-windows-arm64.zip">ARM64 zip</a>

          <b>🐧 Desktop Linux (AppImage)</b>
          • <a href="${BASE}/bedrud-desktop-linux-x86_64.AppImage">x86_64 AppImage</a>
          • <a href="${BASE}/bedrud-desktop-linux-arm64.AppImage">ARM64 AppImage</a>

          <b>🐧 Desktop Linux (portable)</b>
          • <a href="${BASE}/bedrud-desktop-linux-x86_64.tar.xz">x86_64 tar.xz</a>
          • <a href="${BASE}/bedrud-desktop-linux-arm64.tar.xz">ARM64 tar.xz</a>

          <b>🐧 Desktop Linux (.deb)</b>
          • <a href="${BASE}/bedrud-desktop-linux-x86_64.deb">x86_64 .deb</a>
          • <a href="${BASE}/bedrud-desktop-linux-arm64.deb">ARM64 .deb</a>

           <b>🐳 Docker (Debian)</b>
           <code>docker pull ghcr.io/${REPO}:${TAG}</code>

           <b>🐳 Docker (Distroless)</b>
           <code>docker pull ghcr.io/${REPO}:${TAG}-distroless</code>
          EOF
          )

          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=${CHAT_ID}" \
            -d "parse_mode=HTML" \
            -d "disable_web_page_preview=true" \
            --data-urlencode "text=${MSG}"
