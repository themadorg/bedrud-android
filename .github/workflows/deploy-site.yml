name: Deploy Site to GitHub Pages

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # Landing/docs (apps/site) do not ship in the server binary / Docker image.
  # They only need a rebuild when site content changes, or when server docs/swagger change.
  should-deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    outputs:
      site: ${{ steps.decide.outputs.site }}
    steps:
      - uses: actions/checkout@v6
        with:
          # Commit that triggered CI (or current for manual run)
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 0

      - name: Decide whether site needs deploy
        id: decide
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "site=true" >> "$GITHUB_OUTPUT"
            echo "Manual dispatch — always deploy site"
            exit 0
          fi

          HEAD="${{ github.event.workflow_run.head_sha }}"
          # Previous commit on the branch (or empty tree for first push)
          BASE=$(git rev-parse "${HEAD}^" 2>/dev/null || echo "")
          if [ -z "$BASE" ]; then
            echo "site=true" >> "$GITHUB_OUTPUT"
            echo "No parent commit — deploy site"
            exit 0
          fi

          if git diff --name-only "$BASE" "$HEAD" | grep -E '^(apps/site/|server/|\.github/workflows/(ci|deploy-site)\.yml)' >/dev/null; then
            echo "site=true" >> "$GITHUB_OUTPUT"
            echo "Relevant site/server paths changed — deploy site"
          else
            echo "site=false" >> "$GITHUB_OUTPUT"
            echo "No apps/site or server changes — skip site deploy"
          fi

  build:
    runs-on: ubuntu-latest
    needs: should-deploy
    if: needs.should-deploy.outputs.site == 'true'
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - name: Import and Export GPG public key
        env:
          APT_GPG_PRIVATE_KEY: ${{ secrets.APT_GPG_PRIVATE_KEY }}
          APT_GPG_KEY_ID: ${{ secrets.APT_GPG_KEY_ID }}
          RPM_GPG_PRIVATE_KEY: ${{ secrets.RPM_GPG_PRIVATE_KEY }}
        run: |
          GPG_KEY=""
          GPG_KEY_ID="$APT_GPG_KEY_ID"
          
          if [ -n "$APT_GPG_PRIVATE_KEY" ]; then
            GPG_KEY="$APT_GPG_PRIVATE_KEY"
          elif [ -n "$RPM_GPG_PRIVATE_KEY" ]; then
            GPG_KEY="$RPM_GPG_PRIVATE_KEY"
          fi
          
          if [ -n "$GPG_KEY" ]; then
            echo "$GPG_KEY" | gpg --batch --import
            if [ -z "$GPG_KEY_ID" ]; then
              GPG_KEY_ID=$(gpg --list-keys --with-colons | awk -F: '/^pub/{print $5; exit}')
            fi
            gpg --armor --export "$GPG_KEY_ID" > apps/site/public/key.gpg
            gpg --armor --export "$GPG_KEY_ID" > apps/site/public/bedrud.gpg.key
            echo "Successfully exported GPG public key to apps/site/public/key.gpg and bedrud.gpg.key"
          else
            echo "⚠ GPG private key not configured in secrets — skipping GPG key export"
          fi
      - name: Sync swagger.json from server
        run: mkdir -p apps/site/public && cp server/docs/swagger.json apps/site/public/swagger.json
      - uses: withastro/action@v6
        with:
          package-manager: bun@latest
          path: apps/site

  deploy:
    needs: build
    if: needs.build.result == 'success'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
