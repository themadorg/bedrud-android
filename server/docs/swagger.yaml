basePath: /api
definitions:
  auth.ErrorResponse:
    properties:
      error:
        type: string
    type: object
  auth.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    type: object
  auth.LoginResponse:
    properties:
      tokens:
        $ref: '#/definitions/auth.TokenPair'
      user:
        $ref: '#/definitions/models.User'
    type: object
  auth.RegisterRequest:
    properties:
      email:
        type: string
      name:
        type: string
      password:
        type: string
    type: object
  auth.TokenPair:
    properties:
      accessToken:
        type: string
      refreshToken:
        type: string
    type: object
  auth.TokenResponse:
    properties:
      accessToken:
        type: string
      refreshToken:
        type: string
    type: object
  handlers.AuthResponse:
    properties:
      token:
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        type: string
      user:
        $ref: '#/definitions/handlers.UserResponse'
    type: object
  handlers.BulkIDsRequest:
    properties:
      ids:
        items:
          type: string
        type: array
    type: object
  handlers.BulkItemResult:
    properties:
      error:
        type: string
      name:
        type: string
      success:
        type: boolean
    type: object
  handlers.BulkResult:
    properties:
      results:
        additionalProperties:
          $ref: '#/definitions/handlers.BulkItemResult'
        type: object
      totalFailed:
        type: integer
      totalProcessed:
        type: integer
    type: object
  handlers.CreateRoomRequest:
    properties:
      isPublic:
        type: boolean
      maxParticipants:
        type: integer
      mode:
        type: string
      name:
        type: string
      settings:
        $ref: '#/definitions/models.RoomSettings'
    type: object
  handlers.ErrorResponse:
    properties:
      error:
        example: Error message
        type: string
    type: object
  handlers.GuestJoinRoomRequest:
    properties:
      guestName:
        type: string
      roomName:
        type: string
    type: object
  handlers.JoinRoomRequest:
    properties:
      roomName:
        type: string
    type: object
  handlers.LogoutRequest:
    properties:
      refresh_token:
        type: string
    type: object
  handlers.RecordingDTO:
    properties:
      createdAt:
        type: string
      createdBy:
        type: string
      downloadStatus:
        type: string
      durationMs:
        type: integer
      error:
        type: string
      fileSize:
        type: integer
      fileUrl:
        type: string
      id:
        type: string
      recordingType:
        type: string
      roomId:
        type: string
      roomName:
        type: string
      status:
        type: string
    type: object
  handlers.RefreshLiveKitTokenRequest:
    properties:
      roomName:
        type: string
    type: object
  handlers.RefreshRequest:
    properties:
      refresh_token:
        example: eyJhbGciOiJ...
        type: string
    type: object
  handlers.UserDetails:
    properties:
      accesses:
        example:
        - user
        - admin
        items:
          type: string
        type: array
      createdAt:
        example: "2025-01-01 12:00:00"
        type: string
      email:
        example: user@example.com
        type: string
      emailVerifiedAt:
        example: "2025-01-01 12:00:00"
        type: string
      id:
        example: 123e4567-e89b-12d3-a456-426614174000
        type: string
      isActive:
        example: true
        type: boolean
      isAdmin:
        example: false
        type: boolean
      name:
        example: John Doe
        type: string
      provider:
        example: local
        type: string
    type: object
  handlers.UserListResponse:
    properties:
      users:
        items:
          $ref: '#/definitions/handlers.UserDetails'
        type: array
    type: object
  handlers.UserResponse:
    properties:
      avatarUrl:
        example: https://example.com/avatar.jpg
        type: string
      email:
        example: user@example.com
        type: string
      id:
        example: "123456789"
        type: string
      name:
        example: John Doe
        type: string
      provider:
        example: google
        type: string
    type: object
  handlers.createWebhookRequest:
    properties:
      events:
        items:
          type: string
        type: array
      name:
        type: string
      url:
        type: string
    type: object
  handlers.updateWebhookRequest:
    properties:
      events:
        items:
          type: string
        type: array
      isActive:
        type: boolean
      name:
        type: string
      url:
        type: string
    type: object
  handlers.webhookDTO:
    properties:
      createdAt:
        type: string
      createdBy:
        type: string
      events:
        items:
          type: string
        type: array
      id:
        type: string
      isActive:
        type: boolean
      lastSeen:
        type: string
      name:
        type: string
      secret:
        description: only returned once on create/rotate
        type: string
      updatedAt:
        type: string
      url:
        type: string
    type: object
  models.AttentionItem:
    properties:
      daysLeft:
        type: integer
      message:
        type: string
      roomId:
        type: string
      severity:
        description: error, warning, info
        type: string
      type:
        description: tls_expiry, stale_room, empty_room, auth_spike
        type: string
    type: object
  models.DayActivity:
    properties:
      date:
        type: string
      participants:
        type: integer
      roomsActive:
        type: integer
      roomsCreated:
        type: integer
    type: object
  models.FailedJobSummary:
    properties:
      age:
        type: string
      attempts:
        type: integer
      error:
        type: string
      id:
        type: string
      type:
        type: string
      updatedAt:
        type: string
    type: object
  models.InstanceInfo:
    properties:
      name:
        type: string
      startedAt:
        type: string
      uptimeSeconds:
        type: integer
      version:
        type: string
    type: object
  models.InviteToken:
    properties:
      createdAt:
        type: string
      createdBy:
        type: string
      email:
        type: string
      expiresAt:
        type: string
      id:
        type: string
      token:
        type: string
      usedAt:
        type: string
      usedBy:
        type: string
    type: object
  models.KpiEntry:
    properties:
      activeNow:
        type: integer
      delta:
        type: integer
      deltaLabel:
        type: string
      deltaPercent:
        type: integer
      peakToday:
        type: integer
      value:
        type: integer
    type: object
  models.OverviewHealth:
    properties:
      alertsCount:
        type: integer
      dbStatus:
        description: connected, error
        type: string
      realtime:
        description: connected, disconnected
        type: string
      status:
        description: healthy, degraded, down
        type: string
      tls:
        $ref: '#/definitions/models.TLSStatus'
      uptimeSeconds:
        type: integer
    type: object
  models.OverviewKPIs:
    properties:
      activeSessions:
        $ref: '#/definitions/models.KpiEntry'
      onlineNow:
        $ref: '#/definitions/models.KpiEntry'
      pendingActions:
        $ref: '#/definitions/models.KpiEntry'
      totalRooms:
        $ref: '#/definitions/models.KpiEntry'
      totalUsers:
        $ref: '#/definitions/models.KpiEntry'
    type: object
  models.OverviewResponse:
    properties:
      activityTrend:
        items:
          $ref: '#/definitions/models.DayActivity'
        type: array
      health:
        $ref: '#/definitions/models.OverviewHealth'
      instanceInfo:
        $ref: '#/definitions/models.InstanceInfo'
      kpis:
        $ref: '#/definitions/models.OverviewKPIs'
      needsAttention:
        items:
          $ref: '#/definitions/models.AttentionItem'
        type: array
      recentRoomEvents:
        items:
          $ref: '#/definitions/models.RoomEvent'
        type: array
      recentSignups:
        items:
          $ref: '#/definitions/models.RecentUser'
        type: array
      roomComposition:
        $ref: '#/definitions/models.RoomComposition'
    type: object
  models.QueueStats:
    properties:
      active:
        type: integer
      done24h:
        type: integer
      failRate:
        type: number
      failed24h:
        type: integer
      failedEmail24h:
        type: integer
      failedPerMin:
        type: number
      lastSendError:
        type: string
      lastSendErrorAt:
        type: string
      maxDepth:
        type: integer
      oldestPending:
        type: string
      pending:
        type: integer
      pendingEmail:
        type: integer
      processedPerMin:
        type: number
      recentFailures:
        items:
          $ref: '#/definitions/models.FailedJobSummary'
        type: array
      total:
        type: integer
    type: object
  models.RecentUser:
    properties:
      createdAt:
        type: string
      email:
        type: string
      id:
        type: string
      name:
        type: string
      provider:
        type: string
    type: object
  models.Room:
    properties:
      adminId:
        description: Room creator/admin
        type: string
      createdAt:
        type: string
      createdBy:
        type: string
      deletedAt:
        description: Set when room is archived
        type: string
      expiresAt:
        type: string
      id:
        type: string
      isActive:
        type: boolean
      isPublic:
        type: boolean
      lastActivityAt:
        description: Updated on participant join; used for stale-room detection
        type: string
      maxParticipants:
        type: integer
      mode:
        description: Room mode (e.g. 'standard')
        type: string
      name:
        type: string
      settings:
        $ref: '#/definitions/models.RoomSettings'
      updatedAt:
        type: string
    type: object
  models.RoomComposition:
    properties:
      live:
        type: integer
      persistent:
        type: integer
      private:
        type: integer
      public:
        type: integer
      stale:
        type: integer
    type: object
  models.RoomEvent:
    properties:
      roomId:
        type: string
      roomName:
        type: string
      timestamp:
        type: string
      type:
        description: room_created, room_joined
        type: string
      userId:
        type: string
      userName:
        type: string
    type: object
  models.RoomSettings:
    properties:
      allowAudio:
        type: boolean
      allowChat:
        type: boolean
      allowVideo:
        type: boolean
      e2ee:
        type: boolean
      isPersistent:
        type: boolean
      recordingsAllowed:
        description: TODO oncoming feature
        type: boolean
      requireApproval:
        type: boolean
    type: object
  models.SystemSettings:
    properties:
      behindProxy:
