      chatUploadInlineMax:
        type: integer
      chatUploadMaxBytes:
        type: integer
      chatUploadS3AccessKey:
        type: string
      chatUploadS3Bucket:
        type: string
      chatUploadS3Endpoint:
        type: string
      chatUploadS3PublicUrl:
        type: string
      chatUploadS3Region:
        type: string
      chatUploadS3SecretKey:
        type: string
      corsAllowCredentials:
        type: boolean
      corsAllowedHeaders:
        type: string
      corsAllowedMethods:
        type: string
      corsAllowedOrigins:
        description: CORS
        type: string
      corsMaxAge:
        type: integer
      emailButtonBg:
        type: string
      emailFromAddress:
        type: string
      emailFromName:
        type: string
      emailHeaderBg:
        type: string
      emailInstanceName:
        description: Email branding
        type: string
      emailInstanceUrl:
        type: string
      emailPassword:
        type: string
      emailPreheaderChanged:
        type: string
      emailPreheaderInvite:
        type: string
      emailPreheaderReset:
        type: string
      emailPreheaderVerify:
        description: Per-template preheader text overrides
        type: string
      emailPreheaderWelcome:
        type: string
      emailSmtpHost:
        description: SMTP settings in DB (empty = fall back to config.yaml)
        type: string
      emailSmtpPort:
        type: integer
      emailSmtpsMode:
        type: boolean
      emailSubjectChanged:
