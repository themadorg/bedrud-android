      emailUsername:
        type: string
      frontendUrl:
        type: string
      githubClientId:
        type: string
      githubClientSecret:
        type: string
      githubRedirectUrl:
        type: string
      globalDiskThresholdBytes:
        type: integer
      googleClientId:
        type: string
      googleClientSecret:
        type: string
      googleRedirectUrl:
        type: string
      guestLoginEnabled:
        type: boolean
      id:
        type: integer
      jwtSecret:
        type: string
      livekitApiKey:
        type: string
      livekitApiSecret:
        type: string
      livekitExternal:
        type: boolean
      livekitHost:
        description: LiveKit
        type: string
      logLevel:
        description: Logger
        type: string
      maxParticipantsLimit:
        description: Room limits
        type: integer
      maxRoomsPerUser:
        type: integer
      maxUploadBytesPerUser:
