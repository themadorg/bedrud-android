        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.JoinRoomRequest'
      produces:
      - application/json
      responses:
        "200":
          description: '{id, name, token, adminId, livekitHost}'
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "403":
          description: Email not verified
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "404":
          description: Room not found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Failed to join room
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Join room
      tags:
      - rooms
  /room/list:
    get:
      consumes:
      - application/json
      description: List all rooms created by the authenticated user.
      produces:
      - application/json
      responses:
        "200":
          description: List of rooms
          schema:
            items:
              $ref: '#/definitions/models.Room'
            type: array
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Failed to list rooms
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: List rooms
      tags:
      - rooms
  /room/refresh-token:
    post:
      consumes:
      - application/json
      description: Generate a new LiveKit token for an existing room session.
      parameters:
      - description: Room name
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.RefreshLiveKitTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: '{token}'
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "404":
          description: Room not found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Failed to refresh token
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Refresh LiveKit token
      tags:
      - rooms
  /rooms/{id}/recording/start:
    post:
      consumes:
      - application/json
      description: Start a composite recording for a room. Moderator access required.
      parameters:
      - description: Room ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "201":
          description: Recording started
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid room ID
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "403":
          description: Recordings disabled / not allowed / not moderator
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "404":
          description: Room not found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "409":
          description: Active recording already exists
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Recording service not available
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Start recording
      tags:
      - rooms
  /rooms/{id}/recording/stop:
    post:
      consumes:
      - application/json
      description: Stop the active recording for a room. Moderator access required.
      parameters:
      - description: Room ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 'Recording stopped, status: processing'
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid room ID
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "403":
          description: Not moderator
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "404":
          description: Room or recording not found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Recording service not available
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Stop recording
      tags:
      - rooms
  /rooms/{id}/recordings:
    delete:
      consumes:
      - application/json
      description: Delete all recording files and DB records for a room. Room creator
        or superadmin only.
      parameters:
      - description: Room ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Recordings cleared
          schema:
            additionalProperties: true
            type: object
        "207":
          description: Cleared with some file deletion failures
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid room ID
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "403":
          description: Not the room creator
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "404":
          description: Room not found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Failed to clear recordings
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Clear room recordings
      tags:
      - rooms
    get:
      consumes:
      - application/json
      description: List recordings for a room. Participants, room admin, and superadmin
        can view.
      parameters:
      - description: Room ID
        in: path
        name: id
        required: true
        type: string
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 20
        description: Items per page
        in: query
        maximum: 100
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: '{recordings, total, page, limit}'
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid room ID
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "404":
          description: Room not found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Failed to list recordings
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: List recordings
      tags:
      - rooms
  /rooms/{id}/recordings/{recordingId}:
    delete:
      consumes:
      - application/json
      description: Delete a single recording file and DB record. Room creator or superadmin
        only.
      parameters:
      - description: Room ID
        in: path
        name: id
        required: true
        type: string
      - description: Recording ID
        in: path
        name: recordingId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Recording cleared
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid room ID
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "403":
          description: Not the room creator
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "404":
          description: Room or recording not found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Failed to clear recording
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Clear single recording
      tags:
      - rooms
  /rooms/{id}/recordings/{rid}:
    get:
      consumes:
      - application/json
      description: Get details for a single recording.
      parameters:
      - description: Room ID
        in: path
        name: id
        required: true
        type: string
      - description: Recording ID
        in: path
        name: rid
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Recording details
          schema:
            $ref: '#/definitions/handlers.RecordingDTO'
        "400":
          description: Invalid room ID
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "404":
          description: Recording not found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Failed to get recording
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Get recording
      tags:
      - rooms
  /rooms/{id}/recordings/{rid}/wait:
    get:
      consumes:
      - application/json
      description: Long-poll endpoint. Blocks up to 15s, returns when egress is confirmed
        started or failed.
      parameters:
      - description: Room ID
        in: path
        name: id
        required: true
        type: string
      - description: Recording ID
        in: path
        name: rid
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: '{status: active}'
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid room ID
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "404":
          description: Recording not found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "408":
          description: Timeout waiting for egress
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Failed to check recording
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Wait for recording readiness
      tags:
      - rooms
securityDefinitions:
  BearerAuth:
    description: Enter the token with the `Bearer ` prefix, e.g. "Bearer abcde12345"
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
