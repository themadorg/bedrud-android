<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;margin:0;padding:0;background:#f5f5f5">
<table role="presentation" style="width:100%;max-width:560px;margin:40px auto;background:#fff;border-radius:0;overflow:hidden">
<tr><td style="padding:32px 24px;background:#1a1a2e;text-align:center">
<h1 style="color:#fff;margin:0;font-size:24px;font-weight:600">Bedrud</h1>
</td></tr>
<tr><td style="padding:32px 24px">
<h2 style="color:#1a1a2e;font-size:20px;margin:0 0 16px">You're Invited!</h2>
<p style="color:#555;line-height:1.6;margin:0 0 8px"><strong>{{.InviterName}}</strong> invited you to join a room on Bedrud.</p>
{{if .RoomName}}<p style="color:#555;line-height:1.6;margin:0 0 8px">Room: <strong>{{.RoomName}}</strong></p>{{end}}
<p style="color:#555;line-height:1.6;margin:0 0 24px">Click the link below to join:</p>
{{if .JoinURL}}<a href="{{.JoinURL}}" style="display:inline-block;padding:12px 28px;background:#e11d48;color:#fff;text-decoration:none;font-weight:600">Join Room</a>{{end}}
</td></tr>
<tr><td style="padding:16px 24px;background:#f5f5f5;text-align:center;color:#999;font-size:12px">
<p style="margin:0">If you weren't expecting this invitation, you can ignore this email.</p>
</td></tr>
</table>
</body>
</html>
