<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;margin:0;padding:0;background:#f5f5f5">
<table role="presentation" style="width:100%;max-width:560px;margin:40px auto;background:#fff;border-radius:0;overflow:hidden">
<tr><td style="padding:32px 24px;background:#1a1a2e;text-align:center">
<h1 style="color:#fff;margin:0;font-size:24px;font-weight:600">Bedrud</h1>
</td></tr>
<tr><td style="padding:32px 24px">
<h2 style="color:#1a1a2e;font-size:20px;margin:0 0 16px">Password Changed</h2>
<p style="color:#555;line-height:1.6;margin:0 0 8px">Your Bedrud account password was changed successfully.</p>
{{if .IPAddress}}<p style="color:#555;line-height:1.6;margin:0 0 24px">This change was made from IP address: <strong>{{.IPAddress}}</strong></p>{{end}}
<p style="color:#999;font-size:13px;margin:24px 0 0">If you didn't make this change, please contact your administrator immediately.</p>
</td></tr>
<tr><td style="padding:16px 24px;background:#f5f5f5;text-align:center;color:#999;font-size:12px">
<p style="margin:0">This is an automated security notification from Bedrud.</p>
</td></tr>
</table>
</body>
</html>
