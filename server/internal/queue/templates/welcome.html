<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;margin:0;padding:0;background:#f5f5f5">
<table role="presentation" style="width:100%;max-width:560px;margin:40px auto;background:#fff;border-radius:0;overflow:hidden">
<tr><td style="padding:32px 24px;background:#1a1a2e;text-align:center">
<h1 style="color:#fff;margin:0;font-size:24px;font-weight:600">Bedrud</h1>
</td></tr>
<tr><td style="padding:32px 24px">
<h2 style="color:#1a1a2e;font-size:20px;margin:0 0 16px">Welcome, {{.Name}}!</h2>
<p style="color:#555;line-height:1.6;margin:0 0 16px">You've been registered on Bedrud — the self-hosted video meeting platform.</p>
<p style="color:#555;line-height:1.6;margin:0 0 24px">Start by creating a room or joining an existing one. No setup required.</p>
{{if .LoginURL}}<a href="{{.LoginURL}}" style="display:inline-block;padding:12px 28px;background:#e11d48;color:#fff;text-decoration:none;font-weight:600">Go to Bedrud</a>{{end}}
</td></tr>
<tr><td style="padding:16px 24px;background:#f5f5f5;text-align:center;color:#999;font-size:12px">
<p style="margin:0">If you didn't sign up, you can ignore this email.</p>
</td></tr>
</table>
</body>
</html>
