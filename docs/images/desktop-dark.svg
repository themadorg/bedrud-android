  <line x1="2" y1="2" x2="22" y2="22" stroke="#EF4444" stroke-width="2" stroke-linecap="round"/>
</g>
<rect x="488" y="324" width="448" height="220" rx="12" fill="#242424" stroke="#333"/>
<circle cx="712" cy="422" r="32" fill="#6366F1"/>
<text x="712" y="422" text-anchor="middle" fill="#fff" class="sans" font-size="18" font-weight="600" dy="0.35em">YU</text>
<rect x="496" y="518" width="48" height="20" rx="4" fill="#0F0F0F" opacity=".75"/>
<text x="504" y="528" fill="#E2E8F0" class="sans" font-size="12" dy="0.35em">You</text>

