<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" width="960" height="600" role="img" aria-labelledby="svg-title">
<title id="svg-title">Bedrud desktop meeting interface – dark theme</title>
<desc>A mockup of Bedrud video meeting app on desktop, showing a 4-person meeting grid with participant avatars, room controls, and navigation.</desc>
  <style>
    @keyframes pulse-border{0%,100%{opacity:.2}50%{opacity:.6}}
    @keyframes blink-dot{0%,100%{opacity:.5}50%{opacity:1}}
    .glow-border{animation:pulse-border 2s ease-in-out infinite}
    .blink-dot{animation:blink-dot 3s ease-in-out infinite}
    .sans{font-family:system-ui,sans-serif}
    .mono{font-family:ui-monospace,SFMono-Regular,monospace}
    .icon-muted{fill:none;stroke:#64748B;stroke-width:1.2}
    .icon-active{fill:none;stroke:#E2E8F0;stroke-width:1.5}
  </style>

<!-- Window chrome -->
<rect width="960" height="600" fill="#0F0F0F"/>
<rect width="960" height="32" fill="#1A1A1A"/>
<circle cx="22" cy="16" r="6" fill="#EF4444"/>
<circle cx="42" cy="16" r="6" fill="#F59E0B"/>
<circle cx="62" cy="16" r="6" fill="#22C55E"/>
<text x="480" y="16" text-anchor="middle" fill="#64748B" class="sans" font-size="13" dy="0.35em">Bedrud</text>

<!-- Toolbar -->
<rect y="32" width="960" height="48" fill="#242424"/>
<line x1="0" y1="32" x2="960" y2="32" stroke="#333"/>
<line x1="0" y1="80" x2="960" y2="80" stroke="#333"/>
<g transform="translate(26,50) scale(0.5)">
  <path d="M15.75 19.5L8.25 12L15.75 4.5" fill="none" stroke="#E2E8F0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
</g>
<text x="48" y="56" fill="#E2E8F0" class="mono" font-size="14" dy="0.35em">standup</text>
<rect x="112" y="46" width="22" height="20" rx="10" fill="#6366F1" fill-opacity="0.1"/>
<text x="123" y="56" text-anchor="middle" fill="#6366F1" class="sans" font-size="11" font-weight="600" dy="0.35em">4</text>
<text x="874" y="56" text-anchor="end" fill="#64748B" class="mono" font-size="12" dy="0.35em">32:15</text>
<circle cx="900" cy="56" r="14" fill="#6366F1"/>
<text x="900" y="56" text-anchor="middle" fill="#fff" class="sans" font-size="10" font-weight="600" dy="0.35em">YU</text>

<!-- Meeting grid -->
<rect x="24" y="88" width="448" height="220" rx="12" fill="#242424"/>
<rect x="21" y="85" width="454" height="226" rx="14" fill="none" stroke="#6366F1" stroke-width="3" opacity=".4" class="glow-border"/>
<circle cx="248" cy="186" r="32" fill="#6366F1"/>
<text x="248" y="186" text-anchor="middle" fill="#fff" class="sans" font-size="18" font-weight="600" dy="0.35em">AB</text>
<rect x="32" y="282" width="80" height="20" rx="4" fill="#0F0F0F" opacity=".75"/>
  <text x="40" y="292" fill="#E2E8F0" class="sans" font-size="12" dy="0.35em">Alice B.</text>
  <circle cx="460" cy="100" r="4" fill="#22C55E" class="blink-dot"/>

<!-- Participant tiles -->
<rect x="488" y="88" width="448" height="220" rx="12" fill="#242424" stroke="#333"/>
<circle cx="712" cy="186" r="32" fill="#6366F1"/>
<text x="712" y="186" text-anchor="middle" fill="#fff" class="sans" font-size="18" font-weight="600" dy="0.35em">CD</text>
<rect x="496" y="282" width="72" height="20" rx="4" fill="#0F0F0F" opacity=".75"/>
<text x="504" y="292" fill="#E2E8F0" class="sans" font-size="12" dy="0.35em">Chris D.</text>
<rect x="24" y="324" width="448" height="220" rx="12" fill="#242424" stroke="#333"/>
<circle cx="248" cy="422" r="32" fill="#6366F1"/>
<text x="248" y="422" text-anchor="middle" fill="#fff" class="sans" font-size="18" font-weight="600" dy="0.35em">EF</text>
<rect x="32" y="518" width="60" height="20" rx="4" fill="#0F0F0F" opacity=".75"/>
<text x="40" y="528" fill="#E2E8F0" class="sans" font-size="12" dy="0.35em">Eve F.</text>
<rect x="450" y="516" width="22" height="22" rx="4" fill="#0F0F0F" opacity=".75"/>
<g transform="translate(455.24,521.24) scale(0.48)">
